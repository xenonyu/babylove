name: BabyLove
options:
  bundleIdPrefix: com.babylove
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions: [en, zh-Hans, ja, ko]

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "MS49M8LMJ8"
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    TARGETED_DEVICE_FAMILY: "1"

targets:
  BabyLove:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: BabyLove
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylove.app
        INFOPLIST_FILE: BabyLove/Resources/Info.plist
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_PREVIEWS: YES
      debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      release:
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies:
      - sdk: UserNotifications.framework
      - sdk: PhotosUI.framework
      - sdk: Photos.framework
    entitlements:
      path: BabyLove/BabyLove.entitlements
      properties: {}

  BabyLoveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - BabyLoveTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.babylove.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BabyLove.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BabyLove"
    dependencies:
      - target: BabyLove

  BabyLoveUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - BabyLoveUITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.babylove.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: BabyLove
    dependencies:
      - target: BabyLove
